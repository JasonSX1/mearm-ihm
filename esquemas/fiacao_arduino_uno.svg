<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" width="960" height="700" font-family="Arial, sans-serif" font-size="13">
<defs>
  <marker id="dot" markerWidth="4" markerHeight="4" refX="2" refY="2">
    <circle cx="2" cy="2" r="2" fill="#f97316"/>
  </marker>
  <marker id="dotR" markerWidth="4" markerHeight="4" refX="2" refY="2">
    <circle cx="2" cy="2" r="2" fill="#ef4444"/>
  </marker>
  <marker id="dotK" markerWidth="4" markerHeight="4" refX="2" refY="2">
    <circle cx="2" cy="2" r="2" fill="#64748b"/>
  </marker>
</defs>

<!-- ═══ BACKGROUND ═══ -->
<rect width="960" height="700" fill="#0f172a"/>

<!-- ═══ TÍTULO ═══ -->
<text x="480" y="36" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="bold">MeArm V1.0 — Fiação com Arduino UNO</text>
<text x="480" y="56" text-anchor="middle" fill="#64748b" font-size="12">4x Servo SG90  •  Fonte externa 5V–6V 2A  •  Pinos PWM: D6, D9, D10, D11</text>

<!-- ════════════════════════════════════════════════
     ARDUINO UNO
     Board: x=30 y=95 w=175 h=380
═══════════════════════════════════════════════════ -->
<rect x="30" y="95" width="175" height="390" rx="10" fill="#1d4ed8" stroke="#60a5fa" stroke-width="2"/>
<!-- chip -->
<rect x="65" y="285" width="60" height="45" rx="3" fill="#0f172a" stroke="#334155" stroke-width="1"/>
<text x="95" y="306" text-anchor="middle" fill="#475569" font-size="9">ATmega</text>
<text x="95" y="318" text-anchor="middle" fill="#475569" font-size="9">328P</text>
<!-- usb -->
<rect x="14" y="325" width="20" height="30" rx="3" fill="#374151" stroke="#6b7280" stroke-width="1.5"/>
<text x="24" y="362" text-anchor="middle" fill="#9ca3af" font-size="8">USB</text>
<!-- label -->
<text x="117" y="125" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">ARDUINO</text>
<text x="117" y="143" text-anchor="middle" fill="#bfdbfe" font-size="13" font-weight="bold">UNO</text>

<!-- ── Pinos PWM (lado direito do Arduino, x=205) ── -->
<!-- D6 -->
<rect x="193" y="197" width="24" height="16" rx="3" fill="#fbbf24"/>
<text x="190" y="209" text-anchor="end" fill="#fde68a" font-size="11" font-weight="bold">D6 ~</text>
<!-- D9 -->
<rect x="193" y="237" width="24" height="16" rx="3" fill="#fbbf24"/>
<text x="190" y="249" text-anchor="end" fill="#fde68a" font-size="11" font-weight="bold">D9 ~</text>
<!-- D10 -->
<rect x="193" y="270" width="24" height="16" rx="3" fill="#fbbf24"/>
<text x="190" y="282" text-anchor="end" fill="#fde68a" font-size="11" font-weight="bold">D10~</text>
<!-- D11 -->
<rect x="193" y="303" width="24" height="16" rx="3" fill="#fbbf24"/>
<text x="190" y="315" text-anchor="end" fill="#fde68a" font-size="11" font-weight="bold">D11~</text>
<!-- GND -->
<rect x="193" y="403" width="24" height="16" rx="3" fill="#475569"/>
<text x="190" y="415" text-anchor="end" fill="#94a3b8" font-size="11" font-weight="bold">GND</text>
<!-- 5V aviso -->
<rect x="193" y="430" width="24" height="16" rx="3" fill="#7f1d1d"/>
<text x="190" y="442" text-anchor="end" fill="#fca5a5" font-size="10">5V⚠</text>
<text x="40" y="462" fill="#ef4444" font-size="9">⚠ NÃO use nos servos</text>

<!-- ════════════════════════════════════════════════
     TRILHOS DE ALIMENTAÇÃO
     VCC rail: y=618  GND rail: y=643
     Horizontal, de x=30 a x=750
═══════════════════════════════════════════════════ -->
<!-- VCC rail -->
<rect x="30" y="608" width="720" height="20" rx="4" fill="#1e1b4b" stroke="#ef4444" stroke-width="2"/>
<line x1="30" y1="618" x2="750" y2="618" stroke="#ef4444" stroke-width="3"/>
<text x="760" y="623" fill="#fca5a5" font-size="11" font-weight="bold">+ VCC</text>
<!-- GND rail -->
<rect x="30" y="633" width="720" height="20" rx="4" fill="#1c1917" stroke="#64748b" stroke-width="2"/>
<line x1="30" y1="643" x2="750" y2="643" stroke="#64748b" stroke-width="3"/>
<text x="760" y="648" fill="#94a3b8" font-size="11" font-weight="bold">− GND</text>

<!-- rail labels -->
<text x="380" y="600" text-anchor="middle" fill="#64748b" font-size="10">TRILHOS DE ALIMENTAÇÃO (protoboard)</text>

<!-- ════════════════════════════════════════════════
     FONTE USB 5V
     x=30 y=665 w=175 h=50
═══════════════════════════════════════════════════ -->
<rect x="30" y="663" width="175" height="28" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
<text x="117" y="682" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">FONTE USB  5–6V  2A</text>
<!-- terminal VCC da fonte → rail VCC -->
<circle cx="117" cy="608" r="5" fill="#ef4444" stroke="#fca5a5" stroke-width="1.5"/>
<line x1="117" y1="663" x2="117" y2="613" stroke="#ef4444" stroke-width="2.5"/>
<!-- terminal GND da fonte → rail GND -->
<circle cx="145" cy="643" r="5" fill="#64748b" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="145" y1="663" x2="145" y2="648" stroke="#64748b" stroke-width="2.5"/>

<!-- Arduino GND → rail GND (dashed) -->
<polyline points="217,411 245,411 245,643" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="5,3"/>
<circle cx="245" cy="643" r="4" fill="#64748b"/>
<text x="248" y="530" fill="#64748b" font-size="9" transform="rotate(-90,248,530)">GND comum</text>

<!-- ════════════════════════════════════════════════
     SERVOS
     Cada servo: x=500, w=250, h=80
     Garra:    y=75
     Cotovelo: y=205
     Ombro:    y=335
     Base:     y=465
     Conector (3 pinos) no lado esquerdo: x=500
═══════════════════════════════════════════════════ -->

<!-- ── GARRA (D6) y=75..155 center_y=115 ── -->
<rect x="500" y="75" width="250" height="80" rx="8" fill="#2e1065" stroke="#a855f7" stroke-width="2.5"/>
<!-- eixo do servo -->
<rect x="560" y="62" width="35" height="18" rx="4" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
<circle cx="577" cy="71" r="9" fill="#4c1d95" stroke="#a855f7" stroke-width="2"/>
<text x="700" y="113" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">GARRA</text>
<text x="700" y="131" text-anchor="middle" fill="#c4b5fd" font-size="11">Gripper — D6</text>
<!-- pinos do conector (lado esq) -->
<rect x="488" y="100" width="14" height="8" rx="2" fill="#f97316"/>
<rect x="488" y="112" width="14" height="8" rx="2" fill="#ef4444"/>
<rect x="488" y="124" width="14" height="8" rx="2" fill="#475569"/>
<text x="485" y="107" text-anchor="end" fill="#fdba74" font-size="9">SIG</text>
<text x="485" y="119" text-anchor="end" fill="#fca5a5" font-size="9">VCC</text>
<text x="485" y="131" text-anchor="end" fill="#94a3b8" font-size="9">GND</text>

<!-- ── COTOVELO (D9) y=205..285 center_y=245 ── -->
<rect x="500" y="205" width="250" height="80" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2.5"/>
<rect x="560" y="192" width="35" height="18" rx="4" fill="#172554" stroke="#2563eb" stroke-width="1.5"/>
<circle cx="577" cy="201" r="9" fill="#1e40af" stroke="#3b82f6" stroke-width="2"/>
<text x="700" y="243" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">COTOVELO</text>
<text x="700" y="261" text-anchor="middle" fill="#93c5fd" font-size="11">Elbow — D9</text>
<rect x="488" y="230" width="14" height="8" rx="2" fill="#f97316"/>
<rect x="488" y="242" width="14" height="8" rx="2" fill="#ef4444"/>
<rect x="488" y="254" width="14" height="8" rx="2" fill="#475569"/>
<text x="485" y="237" text-anchor="end" fill="#fdba74" font-size="9">SIG</text>
<text x="485" y="249" text-anchor="end" fill="#fca5a5" font-size="9">VCC</text>
<text x="485" y="261" text-anchor="end" fill="#94a3b8" font-size="9">GND</text>

<!-- ── OMBRO (D10) y=335..415 center_y=375 ── -->
<rect x="500" y="335" width="250" height="80" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="2.5"/>
<rect x="560" y="322" width="35" height="18" rx="4" fill="#022c22" stroke="#059669" stroke-width="1.5"/>
<circle cx="577" cy="331" r="9" fill="#065f46" stroke="#10b981" stroke-width="2"/>
<text x="700" y="373" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">OMBRO</text>
<text x="700" y="391" text-anchor="middle" fill="#6ee7b7" font-size="11">Shoulder — D10</text>
<rect x="488" y="360" width="14" height="8" rx="2" fill="#f97316"/>
<rect x="488" y="372" width="14" height="8" rx="2" fill="#ef4444"/>
<rect x="488" y="384" width="14" height="8" rx="2" fill="#475569"/>
<text x="485" y="367" text-anchor="end" fill="#fdba74" font-size="9">SIG</text>
<text x="485" y="379" text-anchor="end" fill="#fca5a5" font-size="9">VCC</text>
<text x="485" y="391" text-anchor="end" fill="#94a3b8" font-size="9">GND</text>

<!-- ── BASE (D11) y=465..545 center_y=505 ── -->
<rect x="500" y="465" width="250" height="80" rx="8" fill="#431407" stroke="#f97316" stroke-width="2.5"/>
<rect x="560" y="452" width="35" height="18" rx="4" fill="#2c0a03" stroke="#ea580c" stroke-width="1.5"/>
<circle cx="577" cy="461" r="9" fill="#7c2d12" stroke="#f97316" stroke-width="2"/>
<text x="700" y="503" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">BASE</text>
<text x="700" y="521" text-anchor="middle" fill="#fdba74" font-size="11">Base — D11</text>
<rect x="488" y="490" width="14" height="8" rx="2" fill="#f97316"/>
<rect x="488" y="502" width="14" height="8" rx="2" fill="#ef4444"/>
<rect x="488" y="514" width="14" height="8" rx="2" fill="#475569"/>
<text x="485" y="497" text-anchor="end" fill="#fdba74" font-size="9">SIG</text>
<text x="485" y="509" text-anchor="end" fill="#fca5a5" font-size="9">VCC</text>
<text x="485" y="521" text-anchor="end" fill="#94a3b8" font-size="9">GND</text>

<!-- ════════════════════════════════════════════════
     FIOS DE SINAL (laranja)
     Roteamento livre de cruzamentos:
     D6  → Garra    (215,205)→(340,205)→(340,104)→(488,104)
     D9  → Cotovelo (215,245)→(488,245)  [linha reta]
     D10 → Ombro    (215,278)→(421,278)→(421,364)→(488,364)
     D11 → Base     (215,311)→(426,311)→(426,494)→(488,494)
═══════════════════════════════════════════════════ -->
<!-- D6 → Garra -->
<polyline points="217,205 340,205 340,104 488,104"
  fill="none" stroke="#f97316" stroke-width="2.5" stroke-linejoin="round"/>
<circle cx="488" cy="104" r="4" fill="#f97316"/>

<!-- D9 → Cotovelo (reta) -->
<line x1="217" y1="245" x2="488" y2="234"
  stroke="#f97316" stroke-width="2.5"/>
<circle cx="488" cy="234" r="4" fill="#f97316"/>

<!-- D10 → Ombro -->
<polyline points="217,278 421,278 421,364 488,364"
  fill="none" stroke="#f97316" stroke-width="2.5" stroke-linejoin="round"/>
<circle cx="488" cy="364" r="4" fill="#f97316"/>

<!-- D11 → Base -->
<polyline points="217,311 426,311 426,494 488,494"
  fill="none" stroke="#f97316" stroke-width="2.5" stroke-linejoin="round"/>
<circle cx="488" cy="494" r="4" fill="#f97316"/>

<!-- ════════════════════════════════════════════════
     FIOS VCC (vermelho) — do servo ao trilho VCC
     Saem do pino VCC de cada servo (x=488, y_vcc)
     e descem verticalmente ao rail y=618
     Usando x escalonados para evitar sobreposição:
     Garra x=510, Cotovelo x=530, Ombro x=550, Base x=570
═══════════════════════════════════════════════════ -->
<!-- Garra VCC: pin(488,116) → left to x=510 → down to 618 -->
<polyline points="488,116 510,116 510,618"
  fill="none" stroke="#ef4444" stroke-width="2" stroke-linejoin="round"/>
<circle cx="510" cy="618" r="4" fill="#ef4444"/>

<!-- Cotovelo VCC: pin(488,246) → x=530 → down -->
<polyline points="488,246 530,246 530,618"
  fill="none" stroke="#ef4444" stroke-width="2" stroke-linejoin="round"/>
<circle cx="530" cy="618" r="4" fill="#ef4444"/>

<!-- Ombro VCC: pin(488,376) → x=550 → down -->
<polyline points="488,376 550,376 550,618"
  fill="none" stroke="#ef4444" stroke-width="2" stroke-linejoin="round"/>
<circle cx="550" cy="618" r="4" fill="#ef4444"/>

<!-- Base VCC: pin(488,506) → x=570 → down -->
<polyline points="488,506 570,506 570,618"
  fill="none" stroke="#ef4444" stroke-width="2" stroke-linejoin="round"/>
<circle cx="570" cy="618" r="4" fill="#ef4444"/>

<!-- ════════════════════════════════════════════════
     FIOS GND (cinza escuro) — do servo ao trilho GND
     x escalonados: 600, 620, 640, 660
     (todos à direita dos fios VCC, sem cruzamento)
═══════════════════════════════════════════════════ -->
<!-- Garra GND: pin(488,128) → x=600 → down to 643 -->
<polyline points="488,128 600,128 600,643"
  fill="none" stroke="#64748b" stroke-width="2" stroke-linejoin="round"/>
<circle cx="600" cy="643" r="4" fill="#64748b"/>

<!-- Cotovelo GND: pin(488,258) → x=620 → down -->
<polyline points="488,258 620,258 620,643"
  fill="none" stroke="#64748b" stroke-width="2" stroke-linejoin="round"/>
<circle cx="620" cy="643" r="4" fill="#64748b"/>

<!-- Ombro GND: pin(488,388) → x=640 → down -->
<polyline points="488,388 640,388 640,643"
  fill="none" stroke="#64748b" stroke-width="2" stroke-linejoin="round"/>
<circle cx="640" cy="643" r="4" fill="#64748b"/>

<!-- Base GND: pin(488,518) → x=660 → down -->
<polyline points="488,518 660,518 660,643"
  fill="none" stroke="#64748b" stroke-width="2" stroke-linejoin="round"/>
<circle cx="660" cy="643" r="4" fill="#64748b"/>

<!-- ════════════════════════════════════════════════
     LEGENDA
═══════════════════════════════════════════════════ -->
<rect x="800" y="75" width="145" height="145" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
<text x="873" y="96" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">LEGENDA</text>

<line x1="815" y1="115" x2="850" y2="115" stroke="#f97316" stroke-width="3"/>
<circle cx="815" cy="115" r="4" fill="#f97316"/>
<text x="858" y="119" fill="#e2e8f0" font-size="11">Sinal (PWM)</text>

<line x1="815" y1="140" x2="850" y2="140" stroke="#ef4444" stroke-width="3"/>
<circle cx="815" cy="140" r="4" fill="#ef4444"/>
<text x="858" y="144" fill="#e2e8f0" font-size="11">VCC (+5V)</text>

<line x1="815" y1="165" x2="850" y2="165" stroke="#64748b" stroke-width="3"/>
<circle cx="815" cy="165" r="4" fill="#64748b"/>
<text x="858" y="169" fill="#e2e8f0" font-size="11">GND</text>

<line x1="815" y1="190" x2="850" y2="190" stroke="#64748b" stroke-width="2" stroke-dasharray="5,3"/>
<text x="858" y="194" fill="#e2e8f0" font-size="11">GND Arduino</text>

<circle cx="823" cy="212" r="4" fill="#f97316"/>
<text x="832" y="216" fill="#e2e8f0" font-size="11">= ponto de</text>
<text x="832" y="228" fill="#e2e8f0" font-size="11">   conexão</text>

<!-- ════════════════════════════════════════════════
     AVISO TENSÃO
═══════════════════════════════════════════════════ -->
<rect x="800" y="260" width="145" height="68" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
<text x="873" y="278" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="bold">⚠  TENSÃO</text>
<text x="873" y="294" text-anchor="middle" fill="#fecaca" font-size="10">SG90: máx 6V</text>
<text x="873" y="308" text-anchor="middle" fill="#fecaca" font-size="10">5.7–6V: OK ✓</text>
<text x="873" y="322" text-anchor="middle" fill="#fca5a5" font-size="10">acima: queima</text>

</svg>
